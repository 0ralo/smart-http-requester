version: '3.8'

services:
  certs-generator:
    image: alpine/openssl:latest
    container_name: smart-http-requester-certs-generator
    volumes:
      - certs:/certs
      - ./docker/generate-certs.sh:/generate-certs.sh:ro
    entrypoint: [ "sh", "/generate-certs.sh" ]
    restart: "no"

  postgres:
    image: postgres:17-alpine
    container_name: smart-http-requester-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
      - certs:/certs
    command: >
      sh -c "if [ -f /certs/postgres.crt ]; then cp /certs/postgres.crt /var/lib/postgresql/data/server.crt && cp /certs/postgres.key /var/lib/postgresql/data/server.key && chmod 600 /var/lib/postgresql/data/server.key && echo \"ssl = on\" >> /var/lib/postgresql/data/postgresql.conf; fi && docker-entrypoint.sh postgres"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      certs-generator:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    container_name: smart-http-requester-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - certs:/certs
    command: >
      redis-server --tls-port 6379 --port 0
      --tls-cert-file /certs/redis.crt
      --tls-key-file /certs/redis.key
      --tls-ca-cert-file /certs/ca.crt
      --tls-auth-clients no
    networks:
      - app-network
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--tls",
          "--cacert", "/certs/ca.crt",
          "--cert", "/certs/redis.crt",
          "--key", "/certs/redis.key",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smart-http-requester-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: administrator
      RABBITMQ_DEFAULT_PASS: P@ssw0rd
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - certs:/etc/rabbitmq/certs
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5671:5671"
      - "15672:15672"
    networks:
      - app-network
    user: "0:0"  # Запуск от root
    command: >
      sh -c "
        chown -R 999:999 /etc/rabbitmq/certs &&
        ls -la /etc/rabbitmq/certs/ | grep -E 'ca.crt|rabbitmq.(crt|key)' &&
        rabbitmq-server
      "
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-http-requester-api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: development
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5671
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: ""
      DEBUG: true
      POSTGRES_USE_SSL: "true"
      REDIS_USE_SSL: "true"
      RABBITMQ_USE_SSL: "true"
      REDIS_CACERT: /certs/ca.crt
      REDIS_CERT: /certs/redis.crt
      REDIS_KEY: /certs/redis.key
    volumes:
      - ./logs:/app/logs
      - .:/app
      - certs:/certs:ro
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: smart-http-requester-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - app-network
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: smart-http-requester-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  certs:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
