global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'smart-http-requester-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    # Override the global default and scrape every 5s.
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'smart-http-requester'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/v1/metrics'

    static_configs:
      - targets:
          - 'api:8000'
    # Uncomment to add labels to all metrics
    # relabel_configs:
    #   - source_labels: [__address__]
    #     target_label: instance
